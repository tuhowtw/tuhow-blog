{{- $pageurl := .Permalink }}
{{- $title := .Title }}

<div class="share-dropdown">
    <button class="share-btn" aria-label="Share" onclick="this.parentElement.classList.toggle('open')">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="18" cy="5" r="3"></circle>
            <circle cx="6" cy="12" r="3"></circle>
            <circle cx="18" cy="19" r="3"></circle>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
        </svg>
        <span>Share</span>
    </button>
    <ul class="share-menu">
        <li>
            <a href="javascript:void(0)" onclick="navigator.clipboard.writeText('{{ $title }} - {{ $pageurl }}').then(()=>{let b=this;b.textContent='✓ Copied!';setTimeout(()=>{b.innerHTML='<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'18\' height=\'18\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'2\'><path d=\'M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71\'></path><path d=\'M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71\'></path></svg> Copy Link'},1500)})">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2">
                    <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                    <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                </svg>
                Copy Link
            </a>
        </li>
        <li>
            <a target="_blank" rel="noopener noreferrer"
                href="https://facebook.com/sharer/sharer.php?u={{ $pageurl }}">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                </svg>
                Facebook
            </a>
        </li>
        <li>
            <a target="_blank" rel="noopener noreferrer"
                href="https://x.com/intent/tweet/?text={{ $title }}&url={{ $pageurl }}">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                </svg>
                X (Twitter)
            </a>
        </li>
    </ul>
</div>

<style>
.share-dropdown {
    position: relative;
    display: inline-block;
    margin: 1rem 0;
}
.share-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--code-bg);
    color: var(--primary);
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s ease;
}
.share-btn:hover {
    background: var(--border);
}
.share-menu {
    display: none;
    position: absolute;
    bottom: 100%;
    left: 0;
    margin-bottom: 6px;
    padding: 6px 0;
    background: var(--entry);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    list-style: none;
    min-width: 180px;
    z-index: 100;
}
.share-dropdown.open .share-menu {
    display: block;
    animation: shareSlideUp 0.15s ease-out;
}
@keyframes shareSlideUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
}
.share-menu li a {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    color: var(--primary);
    text-decoration: none;
    font-size: 14px;
    transition: background 0.15s;
    white-space: nowrap;
}
.share-menu li a:hover {
    background: var(--border);
}
.share-menu li a svg {
    flex-shrink: 0;
}
</style>

<script>
document.addEventListener('click', function(e) {
    document.querySelectorAll('.share-dropdown.open').forEach(function(d) {
        if (!d.contains(e.target)) d.classList.remove('open');
    });
});
</script>
